name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (PR branch or main).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Matches the postgres service in the repo's compose.yaml.
      DATABASE_URL: postgres://domainproof:domainproof@localhost:5432/domainproof
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: domainproof
          POSTGRES_PASSWORD: domainproof
          POSTGRES_DB: domainproof
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U domainproof"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Depth 2 so turbo can diff against the previous commit if needed.
          fetch-depth: 2

      # Version omitted on purpose — reads packageManager from package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # No remote cache token yet (pending hosting/deploy setup); cache turbo's local
      # artifacts across runs instead, keyed on the commit so a re-run of
      # the same SHA hits full cache and other commits fall back to restore-keys.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile

      # Fails fast on unformatted code before the heavier tasks below run.
      - run: pnpm turbo run format:check

      # Applies migrations against the service container above. This also
      # doubles as a from-scratch migration proof on every CI run.
      - run: pnpm --filter api db:migrate

      # Runs whatever tasks exist in each workspace package; turbo no-ops
      # cleanly on packages that don't define a given task.
      #
      # web#build statically prerenders /sso-callback, which reads Clerk's
      # publishable key at build time — @clerk/clerk-react throws if it's
      # missing, failing the whole build. Publishable keys are public by
      # design, so this reads straight from the repo-level Actions variable,
      # no secret handling needed.
      - run: pnpm turbo run lint typecheck test build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
