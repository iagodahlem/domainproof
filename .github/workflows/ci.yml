name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (PR branch or main).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Depth 2 so turbo can diff against the previous commit if needed.
          fetch-depth: 2

      # Version omitted on purpose — reads packageManager from package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # No remote cache token yet (pending hosting/deploy setup); cache turbo's local
      # artifacts across runs instead, keyed on the commit so a re-run of
      # the same SHA hits full cache and other commits fall back to restore-keys.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile

      # Runs whatever tasks exist in each workspace package; turbo no-ops
      # cleanly on packages that don't define a given task.
      - run: pnpm turbo run lint typecheck test build
