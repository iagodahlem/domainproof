# Local stack for full-container runs. Primary dev loop is still
# `pnpm dev` (see README) — this is for testing the built API image
# against a real Postgres, migrations included (the api runs them at
# boot, see apps/api/src/index.ts).
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3101:3001'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://domainproof:domainproof@db:5432/domainproof
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Relies on the HEALTHCHECK baked into apps/api/Dockerfile.

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=domainproof
      - POSTGRES_PASSWORD=domainproof
      - POSTGRES_DB=domainproof
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U domainproof']
      interval: 10s
      timeout: 5s
      retries: 5

  # Local web dev uses `pnpm --filter web dev` for HMR — much faster
  # than a container rebuild loop. Uncomment once full-stack container
  # runs are needed (e.g. for a prod-like smoke test).
  # web:
  #   build:
  #     context: .
  #     dockerfile: apps/web/Dockerfile
  #   ports:
  #     - "3100:3000"
  #   environment:
  #     - NODE_ENV=production
  #   restart: unless-stopped

volumes:
  db-data:
